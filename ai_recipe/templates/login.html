{% extends 'base_template.html' %}
{% load static %} 
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="container mx-auto max-w-md py-16 px-4">
    <div class="card">
      <div class="card-header">
        <h2 class="text-center">Welcome Back</h2>
        <p class="text-center">Log in to your RecipeGen account</p>
      </div>
      <div class="card-content">
        <form method="POST" class="login-form">
          {% csrf_token %}
          {% if error %}
          <div class="error">{{ error }}</div>
          {% endif %}
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <div class="form-header">
              <label for="password">Password</label>
              <a href="/reset-password" class="forgot-password-link">Forgot password?</a>
            </div>
            <input
              type="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <div class="checkbox-group">
            <input type="checkbox" name="rememberMe" id="rememberMe">
            <label for="rememberMe">Remember me for 30 days</label>
          </div>
          <button type="submit" class="submit-btn">Log In</button>
        </form>
      </div>
      <div class="card-footer">
        <p class="footer-text">Don't have an account? <a href="{% url 'signup' %}" class="sign-up-link">Sign up</a></p>
      </div>
    </div>
  </div>
{% endblock %}
